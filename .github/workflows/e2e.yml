name: E2E

on:
  pull_request:
  push:
    branches: [ main ]

concurrency:
  group: e2e-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  playwright:
    name: Playwright (wp-env)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Node 18
        uses: actions/setup-node@v5
        with:
          node-version: '18'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build plugin
        run: npm run build:dev

      - name: Stage built plugin for wp-env
        # .wp-env.json points at ./dist/fotogrids; mirror the zip layout so the
        # site loads the actual built plugin, not the raw repo tree.
        run: |
          rm -rf dist/fotogrids
          mkdir dist/fotogrids
          find dist -mindepth 1 -maxdepth 1 ! -name fotogrids -exec cp -R {} dist/fotogrids/ \;

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Start WordPress (wp-env)
        run: npm run env:start

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Stop WordPress
        if: always()
        run: npm run env:stop

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 14
