name: Lint

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  # ---------------------------------------------------------------------------
  # Syntax matrix: parse every source PHP file on each supported PHP version.
  #
  # `php -l` is a real parser, so this is the authoritative check for whether
  # the code is syntactically valid on a given PHP version. The lowest version
  # in the matrix is the effective floor - if the plugin declares support for a
  # PHP version, that version must be green here.
  #
  # The declared floor is PHP 7.4, so the 7.4 leg must stay green: any 8.x-only
  # construct (enum / readonly / match / named args / union types) reintroduced
  # into src/ will fail it with the exact file:line. Bump or drop matrix
  # versions as the supported range changes.
  # ---------------------------------------------------------------------------
  php-syntax:
    name: PHP syntax (${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: [ '7.4', '8.1', '8.3' ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint all source PHP (php -l)
        id: phplint
        run: |
          # Exclude build output, deps, and the bundled Freemius SDK - same as phpcs.xml.
          files=$(find src -name '*.php' \
            -not -path '*/vendor/*' \
            -not -path '*/dist/*' \
            -not -path '*/freemius/*' \
            -not -path '*/node_modules/*' | sort)

          report="php-syntax-${{ matrix.php }}.txt"
          {
            echo "PHP syntax report - PHP ${{ matrix.php }}"
            echo "Generated: $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
            echo "PHP: $(php -r 'echo PHP_VERSION;')"
            echo "Files checked: $(echo "$files" | wc -l | tr -d ' ')"
            echo "================================================================"
            echo ""
          } > "$report"

          status=0
          fail_count=0
          for f in $files; do
            # php -l writes its message to stdout; capture both streams.
            if ! err=$(php -l "$f" 2>&1); then
              # One block per failing file: path, then the parser's message.
              {
                echo "FILE: $f"
                echo "$err" | sed 's/^/    /'
                echo ""
              } >> "$report"
              echo "::error file=$f::$(echo "$err" | tail -n1)"
              fail_count=$((fail_count + 1))
              status=1
            fi
          done

          if [ "$status" -eq 0 ]; then
            echo "All files parse cleanly on PHP ${{ matrix.php }}." >> "$report"
          else
            # Put the count at the top of the report for a quick read.
            sed -i "5a Files FAILING to parse: ${fail_count}" "$report"
          fi

          echo "report=$report" >> "$GITHUB_OUTPUT"
          exit $status

      - name: Upload syntax report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: php-syntax-report-${{ matrix.php }}
          path: php-syntax-${{ matrix.php }}.txt
          retention-days: 14

  # ---------------------------------------------------------------------------
  # Coding standards: PHPCS against the project ruleset, on the declared floor.
  # ---------------------------------------------------------------------------
  phpcs:
    name: PHP_CodeSniffer
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 7.4
        uses: shivammathur/setup-php@v2
        with:
          php-version: '7.4'
          tools: composer
          coverage: none

      - name: Cache Composer dependencies
        uses: actions/cache@v5
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Run PHPCS
        run: composer lint

      - name: Check PHP compatibility
        run: composer lint:compat
