    <circle class='fg_ia_jump_ring fg_ia_jump_ring_b' cx='120' cy='120' r='35' fill='none' stroke='#000' stroke-width='20' stroke-dasharray='0 220' stroke-dashoffset='-110' stroke-linecap='round'/>
